name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate SKILL
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install pyyaml
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run skill-lint (with full output)
        id: lint
        run: |
          echo "=== skill-lint output ==="
          python scripts/skill_lint.py --path . --strict
          EXIT=$?
          echo "=== exit code: $EXIT ==="
          echo "=== test parse frontmatter directly ==="
          python -c "
          import yaml, sys
          print('yaml version:', yaml.__version__)
          print('python version:', sys.version)
          with open('SKILL.md', encoding='utf-8') as f:
              content = f.read()
          print('SKILL.md first 100 chars:', repr(content[:100]))
          print('SKILL.md total length:', len(content))
          # Parse
          parts = content.split('---')
          print('Number of --- separators:', len(parts) - 1)
          if len(parts) >= 3:
              fm_text = parts[1]
              print('Frontmatter (first 200 chars):', repr(fm_text[:200]))
              try:
                  fm = yaml.safe_load(fm_text)
                  print('Frontmatter parsed OK:', type(fm).__name__)
                  if isinstance(fm, dict):
                      print('  keys:', list(fm.keys()))
                      print('  name:', fm.get('name'))
                      print('  desc len:', len(str(fm.get('description', ''))))
                  else:
                      print('  Not a dict!')
              except Exception as e:
                  print('Parse error:', e)
          "
          # 不 fail,只诊断
          exit 0
