name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate SKILL
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install pyyaml
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run skill-lint (catch all errors)
        run: |
          set +e
          echo "### skill-lint output ###"
          python scripts/skill_lint.py --path . --strict 2>&1
          SL_EXIT=$?
          echo "### skill-lint exit: $SL_EXIT ###"
          echo ""
          echo "### direct yaml test ###"
          python -c "
          import yaml, sys
          print('yaml version:', yaml.__version__)
          print('python:', sys.version)
          with open('SKILL.md', encoding='utf-8') as f:
              content = f.read()
          print('size:', len(content))
          print('first 80 chars:', repr(content[:80]))
          parts = content.split('---')
          print('--- count:', len(parts) - 1)
          if len(parts) >= 3:
              fm_text = parts[1]
              print('frontmatter text len:', len(fm_text))
              print('frontmatter first 100:', repr(fm_text[:100]))
              try:
                  fm = yaml.safe_load(fm_text)
                  print('parsed OK, type:', type(fm).__name__)
                  if isinstance(fm, dict):
                      print('  keys:', list(fm.keys()))
              except Exception as e:
                  print('YAML error:', e)
          " 2>&1
          PY_EXIT=$?
          echo "### yaml test exit: $PY_EXIT ###"
          true
