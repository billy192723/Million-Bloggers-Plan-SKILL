name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate SKILL
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install --no-cache-dir pyyaml

      - name: List files (sanity check)
        run: ls -la SKILL.md scripts/ references/ templates/

      - name: Run skill-lint
        run: python scripts/skill_lint.py --path . --strict

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Verify all scripts --help
        run: |
          for f in scripts/*.py; do
            python "$f" --help > /dev/null 2>&1 && echo "✓ $f" || echo "✗ $f"
          done
